angello.prefix=<gray>[<gold>Notice Board</gold>]</gray> 

command.help.1=<gray>/angello inbox [page] <dark_gray>- View the notice board</dark_gray>
command.help.2=<gray>/angello show <id> <dark_gray>- View one notice</dark_gray>
command.help.3=<gray>/angello unread <dark_gray>- Show unread notice count</dark_gray>
command.help.4=<gray>/angello send <title> || <body> [|| reminder count] <dark_gray>- Publish a new notice</dark_gray>
command.help.5=<gray>/angello list [page] <dark_gray>- View the admin list</dark_gray>
command.help.6=<gray>/angello delete <id> <dark_gray>- Delete one notice</dark_gray>
command.help.7=<gray>/angello reload <dark_gray>- Reload config and language</dark_gray>

command.only-player-inbox=<red>Only players can view their own notice board.</red>
command.only-player-unread=<red>Only players can view their unread notice count.</red>
command.usage.show=<red>Usage: /angello show <id></red>
command.usage.send=<red>Usage: /angello send <title> || <body> [|| reminder count]</red>
command.usage.delete=<red>Usage: /angello delete <id></red>
command.id-must-number=<red>Please enter a valid notice number.</red>
command.body-empty=<red>Notice content cannot be empty.</red>
command.lifetime-must-positive=<red>Reminder count must be a number greater than 0.</red>
command.unread-count=<gray>You currently have <gold>{0}</gold> unread notices.</gray>
command.no-permission-send=<red>You do not have permission to publish notices.</red>
command.no-permission-list=<red>You do not have permission to view the admin list.</red>
command.no-permission-delete=<red>You do not have permission to delete notices.</red>
command.no-permission-reload=<red>You do not have permission to reload the config.</red>
command.sent=<green>Notice #{0} has been published.</green>
command.deleted=<green>Notice #{0} has been deleted.</green>
command.reloaded=<green>angelloNotifier config and language have been reloaded.</green>

notification.separator=<dark_gray>================================</dark_gray>
notification.title-line=<gold>Notice #{0}</gold> {1}
notification.meta-line=<dark_gray>Published by {0} at {1}</dark_gray>
notification.not-found=<red>Could not find notice <white>#{0}</white>.</red>

join.remaining-unread=<yellow>You still have <white>{0}</white> unread notices. Use <gold>/angello inbox</gold> to view them.</yellow>
join.all-read=<green>You have read all current notices.</green>

inbox.empty=<yellow>There are no notices yet.</yellow>
inbox.header=<gold>Notice Board</gold> <gray>(Page <white>{0}</white>/<white>{1}</white>)</gray>
inbox.entry=<gray>- </gray>{0} <click:run_command:/angello show {1}><hover:show_text:"<gray>Click to show this notice again</gray>"><gold>#{1}</gold> {2}</hover></click> <dark_gray>({3})</dark_gray>
inbox.footer=<dark_gray>Use /angello show <id> to view one notice and /angello inbox <page> to turn pages.</dark_gray>

admin.header=<gold>Notice Management</gold> <gray>(Page <white>{0}</white>/<white>{1}</white>)</gray>
admin.entry=<gray>- </gray><gold>#{0}</gold> {1} <dark_gray>[{2} | {3} | auto-remind {4} times]</dark_gray>

state.read=<green>[READ]</green>
state.unread=<red>[UNREAD]</red>
