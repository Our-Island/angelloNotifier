angello.prefix=<gray>[<gold>公告栏</gold>]</gray> 

command.help.1=<gray>/angello inbox [页码] <dark_gray>- 查看公告栏</dark_gray>
command.help.2=<gray>/angello show <编号> <dark_gray>- 查看一条公告</dark_gray>
command.help.3=<gray>/angello unread <dark_gray>- 查看未读数量</dark_gray>
command.help.4=<gray>/angello send <标题> || <正文> [|| 提醒次数] <dark_gray>- 发布新公告</dark_gray>
command.help.5=<gray>/angello import <URI> <dark_gray>- 从 JSON 文件导入并发布公告</dark_gray>
command.help.6=<gray>/angello list [页码] <dark_gray>- 查看管理列表</dark_gray>
command.help.7=<gray>/angello delete <编号> <dark_gray>- 删除一条公告</dark_gray>
command.help.8=<gray>/angello reload <dark_gray>- 重载配置与语言</dark_gray>

command.only-player-inbox=<red>只有玩家可以查看自己的公告栏。</red>
command.only-player-unread=<red>只有玩家可以查看自己的未读数量。</red>
command.usage.show=<red>用法：/angello show <编号></red>
