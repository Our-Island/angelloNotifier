angello.prefix=<gray>[<gold>公告欄</gold>]</gray> 

command.help.1=<gray>/angello inbox [頁碼] <dark_gray>- 查看公告欄</dark_gray>
command.help.2=<gray>/angello show <編號> <dark_gray>- 查看一條公告</dark_gray>
command.help.3=<gray>/angello unread <dark_gray>- 查看未讀數量</dark_gray>
command.help.4=<gray>/angello send <標題> || <正文> [|| 提醒次數] <dark_gray>- 發布新公告</dark_gray>
command.help.5=<gray>/angello import <URI> <dark_gray>- 從 JSON 檔案匯入並發布公告</dark_gray>
command.help.6=<gray>/angello list [頁碼] <dark_gray>- 查看管理列表</dark_gray>
command.help.7=<gray>/angello delete <編號> <dark_gray>- 刪除一條公告</dark_gray>
command.help.8=<gray>/angello reload <dark_gray>- 重載配置與語言</dark_gray>

